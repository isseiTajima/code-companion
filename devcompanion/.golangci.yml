linters-settings:
  govet:
    check-shadowing: true
  golint:
    min-confidence: 0.8
  gofmt:
    simplify: true
  misspell:
    locale: US

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - structcheck
    - varcheck
    - ineffassign
    - deadcode
    - typecheck
    - gofmt
    - misspell
    - revive

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - frontend
    - build
    - wailsjs

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
